services:
  docmind-api:
    build: .
    image: docmind-chat:latest
    container_name: docmind-chat
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Persists ingested documents, the Chroma vector DB, and the
      # HuggingFace model cache across container restarts/rebuilds.
      - ./data:/app/data
    restart: unless-stopped

    # --- Optional: uncomment to enable GPU acceleration for the LLM ---
    # (requires the NVIDIA Container Toolkit installed on the host)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
